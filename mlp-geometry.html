            <h1>Geometry of MLPs</h1>

            <div class="meta">Machine Learning • Geometry</div>

            <div class="block">
                <p>
                    A multilayer perceptron without non-linearity collapses into
                    a single affine transformation.
                </p>
            </div>

            <div class="block highlight">
                This means depth alone does not increase expressive power
                without non-linearity.
            </div>

            <div class="block">
                <p>Composition of affine maps:</p>
                <p>f(x) = W₂(W₁x + b₁) + b₂ = Wx + b</p>
            </div>
        </div>
